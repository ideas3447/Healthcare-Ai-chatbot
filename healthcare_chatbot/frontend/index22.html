<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediAssist AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      background: #060b14;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
      padding: 1rem;
    }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse2   { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.15);opacity:.7} }
    @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:.2} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    ::-webkit-scrollbar          { width: 4px; }
    ::-webkit-scrollbar-track    { background: transparent; }
    ::-webkit-scrollbar-thumb    { background: #1e3a5a; border-radius: 4px; }
    textarea:focus { outline: none; }
    button { cursor: pointer; border: none; }

    /* ── Shell ── */
    #app {
      width: 100%;
      max-width: 820px;
      height: 96vh;
      display: flex;
      flex-direction: column;
      background: #0a1628;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 40px 120px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04), inset 0 1px 0 rgba(255,255,255,.06);
      position: relative;
    }

    /* ambient glow */
    #app::before {
      content: '';
      position: absolute;
      top: -100px; left: 50%;
      transform: translateX(-50%);
      width: 500px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0,122,255,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Top bar ── */
    #topbar {
      padding: 1rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid rgba(255,255,255,.05);
      background: rgba(255,255,255,.02);
      backdrop-filter: blur(20px);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }
    #logo {
      width: 44px; height: 44px;
      border-radius: 14px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #0a84ff 0%, #30d158 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(10,132,255,.35);
      position: relative;
      font-size: 1.3rem;
    }
    #logo-dot {
      position: absolute;
      bottom: 3px; right: 3px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #30d158;
      border: 2px solid #0a1628;
      animation: pulse2 2s infinite;
    }
    #title-block { flex: 1; }
    #title-block .name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem; font-weight: 400;
      color: #f0f6ff; letter-spacing: .01em;
    }
    #title-block .sub {
      font-size: .7rem; color: #4a7fa5;
      font-weight: 500; letter-spacing: .06em;
      text-transform: uppercase;
    }
    #alert-pill {
      display: none;
      padding: .3rem .85rem;
      border-radius: 20px;
      font-size: .72rem; font-weight: 600;
      letter-spacing: .04em; text-transform: uppercase;
    }
    #reset-btn {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: rgba(255,255,255,.05);
      color: #4a7fa5; font-size: .85rem;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    #reset-btn:hover { background: rgba(255,255,255,.1); color: #7aabcc; }

    /* ── Symptom tracker ── */
    #tracker {
      display: none;
      padding: .6rem 1.4rem;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(255,255,255,.04);
      background: rgba(10,132,255,.04);
      flex-shrink: 0;
      animation: fadeUp .3s ease;
    }
    #tracker .label {
      font-size: .65rem; color: #4a7fa5;
      font-weight: 600; text-transform: uppercase;
      letter-spacing: .08em; flex-shrink: 0;
    }
    .sym-chip {
      background: rgba(10,132,255,.15);
      border: 1px solid rgba(10,132,255,.25);
      color: #5ac8fa;
      font-size: .7rem; font-weight: 500;
      padding: .2rem .6rem;
      border-radius: 20px;
    }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      position: relative;
      z-index: 1;
    }

    /* user bubble */
    .msg-user {
      display: flex;
      justify-content: flex-end;
      animation: fadeUp .35s ease;
    }
    .bubble-user {
      max-width: 72%;
      background: linear-gradient(135deg, #0a84ff, #0066cc);
      color: #fff;
      border-radius: 18px 18px 4px 18px;
      padding: .75rem 1.1rem;
      font-size: .88rem;
      line-height: 1.55;
      font-weight: 400;
      box-shadow: 0 4px 20px rgba(10,132,255,.3);
    }

    /* bot row */
    .msg-bot {
      display: flex;
      gap: .75rem;
      align-items: flex-start;
      animation: fadeUp .35s ease;
    }
    .bot-avatar {
      width: 34px; height: 34px;
      border-radius: 11px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #1c3a5e, #0a2440);
      border: 1px solid rgba(10,132,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: .95rem;
      margin-top: 2px;
    }
    .bot-content { flex: 1; max-width: 85%; }

    /* welcome card */
    .card-welcome {
      background: linear-gradient(135deg, rgba(10,132,255,.08), rgba(48,209,88,.05));
      border: 1px solid rgba(10,132,255,.15);
      border-radius: 4px 18px 18px 18px;
      padding: 1.2rem 1.3rem;
    }
    .card-welcome .hi {
      font-family: 'DM Serif Display', serif;
      font-size: 1.05rem; color: #e8f4ff;
      margin-bottom: .5rem;
    }
    .card-welcome .desc {
      font-size: .85rem; color: #7aabcc;
      line-height: 1.65; margin-bottom: .9rem;
    }
    .card-welcome .warn {
      background: rgba(255,159,10,.08);
      border: 1px solid rgba(255,159,10,.2);
      border-radius: 10px;
      padding: .6rem .85rem;
      font-size: .75rem; color: #ffd60a;
      line-height: 1.5;
    }

    /* emergency card */
    .card-emergency {
      background: rgba(255,59,48,.1);
      border: 2px solid rgba(255,59,48,.4);
      border-radius: 4px 18px 18px 18px;
      padding: 1.1rem 1.3rem;
    }
    .card-emergency .title {
      font-size: .95rem; font-weight: 700;
      color: #ff3b30; margin-bottom: .5rem;
    }
    .card-emergency .body {
      font-size: .85rem; color: #ffb3b0;
      line-height: 1.6; margin-bottom: .8rem;
    }
    .emerg-row {
      display: flex; justify-content: space-between;
      background: rgba(255,59,48,.12);
      border-radius: 8px;
      padding: .45rem .75rem;
      font-size: .8rem;
      margin-bottom: .4rem;
    }
    .emerg-row:last-child { margin-bottom: 0; }
    .emerg-row .lbl { color: #ffb3b0; }
    .emerg-row .num { color: #ff3b30; font-weight: 700; }

    /* need-more card */
    .card-need {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 4px 18px 18px 18px;
      padding: .85rem 1.1rem;
    }
    .card-need .noted-ok  { font-size: .78rem; color: #30d158; margin-bottom: .5rem; font-weight: 500; }
    .card-need .noted-bad { font-size: .78rem; color: #ff9f0a; margin-bottom: .5rem; }
    .card-need .ask       { font-size: .87rem; color: #b0c8e0; line-height: 1.55; }

    /* result card */
    .card-result {
      background: rgba(255,255,255,.03);
      border-radius: 4px 18px 18px 18px;
      overflow: hidden;
    }
    .result-header {
      padding: .7rem 1.2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .result-header .lvl-label {
      font-size: .8rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .result-header .score-badge {
      font-size: .7rem; font-weight: 600;
      padding: .15rem .5rem; border-radius: 10px;
    }
    .result-body { padding: 1rem 1.2rem; display: flex; flex-direction: column; gap: .85rem; }
    .result-section-label {
      font-size: .68rem; color: #4a7fa5;
      text-transform: uppercase; letter-spacing: .08em;
      font-weight: 600; margin-bottom: .35rem;
    }
    .disease-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem; color: #e8f4ff; margin-bottom: .3rem;
    }
    .conf-row { display: flex; align-items: center; gap: .6rem; }
    .conf-bar-track {
      flex: 1; height: 4px;
      background: rgba(255,255,255,.07);
      border-radius: 4px; overflow: hidden;
    }
    .conf-bar-fill {
      height: 100%; border-radius: 4px;
      transition: width .8s cubic-bezier(.4,0,.2,1);
    }
    .conf-pct { font-size: .72rem; color: #4a7fa5; font-weight: 600; flex-shrink: 0; }
    .redflags-box {
      background: rgba(255,59,48,.08);
      border: 1px solid rgba(255,59,48,.2);
      border-radius: 10px; padding: .6rem .85rem;
    }
    .redflags-box .rf-title { font-size: .7rem; color: #ff3b30; font-weight: 600; margin-bottom: .3rem; }
    .redflags-box .rf-body  { font-size: .78rem; color: #ffb3b0; }
    .result-description {
      font-size: .82rem; color: #7aabcc; line-height: 1.65;
      padding-top: .5rem;
      border-top: 1px solid rgba(255,255,255,.05);
    }
    .sym-tags { display: flex; flex-wrap: wrap; gap: .35rem; }
    .sym-tag {
      font-size: .68rem; padding: .15rem .5rem;
      border-radius: 20px; font-weight: 500;
      background: rgba(255,255,255,.05);
      color: #6a9bbf;
      border: 1px solid rgba(255,255,255,.07);
    }
    .result-hint { font-size: .75rem; color: #3a6080; font-style: italic; }

    /* typing indicator */
    #typing {
      display: none;
      gap: .75rem;
      align-items: flex-start;
      animation: fadeUp .3s ease;
    }
    .typing-bubble {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 4px 18px 18px 18px;
      padding: .75rem 1rem;
      display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%; background: #0a84ff;
      animation: blink 1.1s infinite;
    }
    .dot:nth-child(2) { animation-delay: 150ms; }
    .dot:nth-child(3) { animation-delay: 300ms; }

    /* ── Quick chips ── */
    #quick-wrap {
      padding: .7rem 1.4rem;
      flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,.04);
      background: rgba(255,255,255,.01);
    }
    #quick-wrap .q-label {
      font-size: .67rem; color: #3a6080;
      font-weight: 600; text-transform: uppercase;
      letter-spacing: .08em; margin-bottom: .5rem;
    }
    #quick-chips { display: flex; flex-wrap: wrap; gap: .4rem; }
    .q-chip {
      background: rgba(10,132,255,.08);
      border: 1px solid rgba(10,132,255,.18);
      color: #5ac8fa;
      font-size: .73rem; font-weight: 500;
      padding: .28rem .7rem; border-radius: 20px;
      transition: all .15s;
      font-family: inherit;
    }
    .q-chip:hover {
      background: rgba(10,132,255,.18);
      border-color: rgba(10,132,255,.4);
    }

    /* ── Input bar ── */
    #input-bar {
      padding: 1rem 1.2rem;
      background: rgba(255,255,255,.02);
      border-top: 1px solid rgba(255,255,255,.05);
      flex-shrink: 0;
      position: relative; z-index: 10;
    }
    #input-box {
      display: flex; gap: .7rem; align-items: flex-end;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: .6rem .7rem .6rem 1rem;
      transition: border-color .2s;
    }
    #input-box:focus-within { border-color: rgba(10,132,255,.4); }
    #input-textarea {
      flex: 1; background: transparent; border: none;
      color: #e8f4ff; font-size: .88rem; resize: none;
      max-height: 100px; min-height: 28px;
      line-height: 1.55; font-family: inherit;
      font-weight: 400; caret-color: #0a84ff;
    }
    #send-btn {
      width: 38px; height: 38px;
      border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    #send-btn.active {
      background: linear-gradient(135deg, #0a84ff, #0066cc);
      box-shadow: 0 4px 16px rgba(10,132,255,.35);
    }
    #send-btn.inactive {
      background: rgba(255,255,255,.06);
    }
    #footer-note {
      text-align: center; font-size: .65rem;
      color: #2a4a66; margin-top: .5rem; letter-spacing: .02em;
    }
  </style>
</head>
<body>

<div id="app">
  <!-- Top bar -->
  <div id="topbar">
    <div id="logo">⚕️<div id="logo-dot"></div></div>
    <div id="title-block">
      <div class="name">MediAssist AI</div>
      <div class="sub">Symptom Analysis · Emergency Detection</div>
    </div>
    <div id="alert-pill"></div>
    <button id="reset-btn" title="New conversation">↺</button>
  </div>

  <!-- Symptom tracker -->
  <div id="tracker">
    <span class="label">Noted</span>
    <div id="tracker-chips"></div>
  </div>

  <!-- Messages -->
  <div id="messages">
    <!-- bot messages injected here -->
    <div id="typing" style="display:none">
      <div class="bot-avatar">⚕</div>
      <div class="typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  </div>

  <!-- Quick chips -->
  <div id="quick-wrap">
    <div class="q-label">Quick add</div>
    <div id="quick-chips"></div>
  </div>

  <!-- Input -->
  <div id="input-bar">
    <div id="input-box">
      <textarea id="input-textarea" rows="1"
        placeholder="Describe your symptoms… e.g. I have a fever and headache"></textarea>
      <button id="send-btn" class="inactive">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#3a6080" id="send-icon">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div id="footer-note">MediAssist AI · University of Energy and Natural Resources · Not a substitute for medical advice</div>
  </div>
</div>

  "runny nose":"runny_nose","stuffy nose":"congestion","blocked nose":"congestion",
  "sneezing":"continuous_sneezing","sneeze":"continuous_sneezing",
  "phlegm":"phlegm","mucus":"phlegm","sweating":"sweating","sweat":"sweating",
  "weight loss":"weight_loss","losing weight":"weight_loss",
  "no appetite":"loss_of_appetite","frequent urination":"polyuria","urinating a lot":"polyuria",
  "burning urination":"burning_micturition","pain urinating":"burning_micturition",
  "heart racing":"fast_heart_rate","fast heartbeat":"fast_heart_rate","palpitations":"palpitations",
  "coughing blood":"blood_in_sputum","slurred speech":"slurred_speech",
  "leg pain":"joint_pain","leg ache":"joint_pain","legs hurt":"joint_pain","legs aching":"joint_pain",
  "knee pain":"knee_pain","hip pain":"hip_joint_pain",
  "arm pain":"muscle_pain","shoulder pain":"muscle_pain","muscle ache":"muscle_pain",
  "foot pain":"painful_walking","feet pain":"painful_walking",
  "lower back pain":"back_pain","upper back pain":"back_pain",
  "stomach ache":"stomach_pain","abdominal pain":"abdominal_pain",
};
const NO_MORE = ["no","none","no more","i don't have","i do not have","nothing","that's all",
  "thats all","no other","nothing else","just that","only that","that's it","thats it","nothing more","i have none"];
const QUICK_SYMPTOMS = ["Headache","Fever","Cough","Fatigue","Nausea","Chest pain","Dizziness","Rash","Joint pain","Vomiting"];

const ALERT_COLORS = {
  EMERGENCY:{ bg:"#ff3b30", light:"rgba(255,59,48,0.12)", text:"#ff3b30" },
  WARNING:  { bg:"#ff9f0a", light:"rgba(255,159,10,0.12)", text:"#ff9f0a" },
  NORMAL:   { bg:"#30d158", light:"rgba(48,209,88,0.12)",  text:"#30d158" },
};

// ── Logic ─────────────────────────────────────────────────────────────────────
function extractSymptoms(text) {
  let lower = text.toLowerCase().replace(/[^\w\s]/g," ");
  const found = new Set();
  const phrases = Object.keys(ALIASES).sort((a,b)=>b.length-a.length);
  for (const p of phrases) {
    const re = new RegExp("\\b"+p.replace(/\s+/g,"\\s+")+"\\b");
    if (re.test(lower)) { found.add(ALIASES[p]); lower = lower.replace(re," "); }
  }
  return [...found];
}
function detectIntent(text) {
  const l = text.toLowerCase();
  if (/\b(hello|hi|hey|good morning|good evening|good afternoon)\b/.test(l)) return "greeting";
  if (/\b(emergency|urgent|help|dying|ambulance|911|112)\b/.test(l)) return "emergency";
  if (/\b(thanks|thank you)\b/.test(l)) return "thanks";
  if (/\b(bye|goodbye|see you)\b/.test(l)) return "farewell";
  return "symptom";
}
function saysNoMore(text) {
  const l = text.toLowerCase().trim();
  return NO_MORE.some(p => l === p || l.startsWith(p));
}
function predictDisease(symptoms) {
  let best = null, bestScore = -1;
  for (const [disease, dsyms] of Object.entries(DISEASE_SYMPTOMS)) {
    const matches = symptoms.filter(s => dsyms.includes(s)).length;
    const score = matches / Math.max(dsyms.length, symptoms.length);
    if (score > bestScore) { bestScore = score; best = disease; }
  }
  const conf = Math.min(97, Math.round(48 + bestScore * 52));
  return { disease: best || "Unknown", confidence: conf };
}
function evaluateEmergency(symptoms, disease) {
  const score = symptoms.reduce((s,sym)=>s+(SEVERITY[sym]||0),0);
  const redFlags = symptoms.filter(s=>RED_FLAG_SYMPTOMS.has(s));
  const isEmergency = EMERGENCY_DISEASES.has(disease) || redFlags.length>0 || score>=13;
  const isWarning = !isEmergency && score>=8;
  return { level: isEmergency?"EMERGENCY":isWarning?"WARNING":"NORMAL", score, redFlags };
}

// ── State ─────────────────────────────────────────────────────────────────────
let symptoms = [];
let currentAlert = null;
let stage = "start";
let showQuick = true;

// ── DOM helpers ───────────────────────────────────────────────────────────────
const msgArea   = document.getElementById("messages");
const typingEl  = document.getElementById("typing");
const trackerEl = document.getElementById("tracker");
const trackerChips = document.getElementById("tracker-chips");
const alertPill = document.getElementById("alert-pill");
const quickWrap = document.getElementById("quick-wrap");
const textarea  = document.getElementById("input-textarea");
const sendBtn   = document.getElementById("send-btn");
const sendIcon  = document.getElementById("send-icon");

function scrollBottom() {
  msgArea.scrollTop = msgArea.scrollHeight;
}

function updateSendBtn() {
  const active = textarea.value.trim().length > 0;
  sendBtn.className = active ? "active" : "inactive";
  sendIcon.setAttribute("fill", active ? "#fff" : "#3a6080");
}

function updateTracker() {
  if (symptoms.length === 0) {
    trackerEl.style.display = "none";
    return;
  }
  trackerEl.style.display = "flex";
  trackerChips.innerHTML = symptoms.map(s=>
    `<span class="sym-chip">${s.replace(/_/g," ")}</span>`
  ).join("");
}

function updateAlertPill(ev) {
  if (!ev) { alertPill.style.display="none"; return; }
  const c = ALERT_COLORS[ev.level];
  alertPill.style.display = "inline-block";
  alertPill.style.background = c.light;
  alertPill.style.border = `1px solid ${c.text}40`;
  alertPill.style.color = c.text;
  alertPill.style.animation = ev.level==="EMERGENCY" ? "blink 1.2s infinite" : "none";
  alertPill.textContent =
    ev.level==="EMERGENCY" ? "🚨 Emergency" :
    ev.level==="WARNING"   ? "⚠️ Warning"   : "✓ Normal";
}

function appendUserMsg(text) {
  const div = document.createElement("div");
  div.className = "msg-user";
  div.innerHTML = `<div class="bubble-user">${escHtml(text)}</div>`;
  msgArea.insertBefore(div, typingEl);
  scrollBottom();
}

function appendBotMsg(html) {
  const row = document.createElement("div");
  row.className = "msg-bot";
  row.innerHTML = `
    <div class="bot-avatar">⚕</div>
    <div class="bot-content">${html}</div>`;
  msgArea.insertBefore(row, typingEl);
  scrollBottom();
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Card builders ─────────────────────────────────────────────────────────────
function buildWelcome() {
  return `<div class="card-welcome">
    <div class="hi">Hello, I'm MediAssist AI 👋</div>
    <div class="desc">I can help you analyse your symptoms and check for potential health conditions — including detecting emergencies that need immediate care.</div>
    <div class="warn">⚠️ This tool provides preliminary guidance only and does not replace professional medical advice.</div>
  </div>`;
}

function buildEmergency() {
  const rows = [["Ghana Emergency","112"],["Ambulance","193"],["International","911 / 999"]];
  return `<div class="card-emergency">
    <div class="title">🚨 Emergency Detected</div>
    <div class="body">Your symptoms suggest a potentially life-threatening situation. Please act immediately.</div>
    ${rows.map(([l,n])=>`<div class="emerg-row"><span class="lbl">${l}</span><span class="num">${n}</span></div>`).join("")}
  </div>`;
}

function buildNeedMore(data) {
  const notedHtml = data.added.length>0
    ? `<div class="noted-ok">✓ Noted: ${data.added.map(s=>s.replace(/_/g," ")).join(", ")}</div>`
    : `<div class="noted-bad">I couldn't identify a specific symptom — try describing it differently.</div>`;
  const soFar = data.noted.length>0
    ? `So far I have: ${data.noted.map(s=>s.replace(/_/g," ")).join(", ")}. `
    : "";
  return `<div class="card-need">
    ${notedHtml}
    <div class="ask">${soFar}Could you describe ${data.needed} more symptom${data.needed>1?"s":""}? The more you share, the more accurate my analysis will be.</div>
  </div>`;
}

function buildResult(data) {
  const c = ALERT_COLORS[data.alert.level];
  const lvlText =
    data.alert.level==="EMERGENCY" ? "🚨 Emergency — Call 112 Now" :
    data.alert.level==="WARNING"   ? "⚠️ Warning — Visit a Doctor Today" :
                                     "✓ Non-Critical — Monitor Your Condition";
  const rfHtml = data.alert.redFlags && data.alert.redFlags.length>0
    ? `<div class="redflags-box">
        <div class="rf-title">⚡ Critical Symptoms Detected</div>
        <div class="rf-body">${data.alert.redFlags.map(s=>s.replace(/_/g," ")).join(" · ")}</div>
       </div>`
    : "";
  const symTags = data.symptoms.map(s=>`<span class="sym-tag">${s.replace(/_/g," ")}</span>`).join("");

  return `<div class="card-result" style="border:1px solid ${c.text}30">
    <div class="result-header" style="background:${c.light};border-bottom:1px solid ${c.text}20">
      <div class="lvl-label" style="color:${c.text}">${lvlText}</div>
      <div class="score-badge" style="color:${c.text};background:${c.text}20">Score: ${data.alert.score}</div>
    </div>
    <div class="result-body">
      <div>
        <div class="result-section-label">Predicted Condition</div>
        <div class="disease-name">${escHtml(data.disease)}</div>
        <div class="conf-row">
          <div class="conf-bar-track">
            <div class="conf-bar-fill" style="width:${data.confidence}%;background:linear-gradient(90deg,${c.bg},${c.bg}99)"></div>
          </div>
          <span class="conf-pct">${data.confidence}% confidence</span>
        </div>
      </div>
      ${rfHtml}
      <div class="result-description">${escHtml(data.description)}</div>
      <div class="sym-tags">${symTags}</div>
      <div class="result-hint">Describe more symptoms to refine this result, or type 'bye' to end.</div>
    </div>
  </div>`;
}

// ── Bot response logic ────────────────────────────────────────────────────────
function showTyping() {
  typingEl.style.display = "flex";
  scrollBottom();
}
function hideTyping() {
  typingEl.style.display = "none";
}

function respond(text) {
  hideTyping();
  const intent = detectIntent(text);

  if (intent==="greeting" && stage==="start") { appendBotMsg(buildWelcome()); return; }
  if (intent==="thanks" || intent==="farewell") { resetAll(); return; }
  if (intent==="emergency") {
    currentAlert = {level:"EMERGENCY"};
    updateAlertPill(currentAlert);
    appendBotMsg(buildEmergency()); return;
  }
  if (saysNoMore(text) && symptoms.length>=1) { runPrediction(symptoms); return; }

  const newSyms = extractSymptoms(text);
  const justAdded = newSyms.filter(s=>!symptoms.includes(s));
  const allSyms = [...new Set([...symptoms,...newSyms])];
  symptoms = allSyms;
  updateTracker();

  if (allSyms.length<2) {
    appendBotMsg(buildNeedMore({noted:allSyms, added:justAdded, needed:2-allSyms.length}));
    stage = "collecting"; return;
  }
  runPrediction(allSyms);
}

function runPrediction(allSyms) {
  const {disease,confidence} = predictDisease(allSyms);
  const ev = evaluateEmergency(allSyms, disease);
  currentAlert = ev;
  updateAlertPill(ev);
  appendBotMsg(buildResult({
    symptoms: allSyms, disease, confidence,
    description: DESCRIPTIONS[disease] || "Please consult a medical professional.",
    alert: ev,
  }));
  stage = "predicted";
}

function processInput(text) {
  const trimmed = text.trim();
  if (!trimmed) return;
  if (showQuick) { quickWrap.style.display="none"; showQuick=false; }
  appendUserMsg(trimmed);
  textarea.value = "";
  updateSendBtn();
  textarea.style.height = "auto";
  showTyping();
  setTimeout(()=>respond(trimmed), 1000+Math.random()*500);
}

function resetAll() {
  symptoms=[]; currentAlert=null; stage="start"; showQuick=true;
  msgArea.innerHTML = "";
  msgArea.appendChild(typingEl);
  trackerEl.style.display="none";
  trackerChips.innerHTML="";
  alertPill.style.display="none";
  quickWrap.style.display="block";
  setTimeout(()=>{ appendBotMsg(buildWelcome()); }, 200);
}

// ── Quick chips ───────────────────────────────────────────────────────────────
const qChipsEl = document.getElementById("quick-chips");
QUICK_SYMPTOMS.forEach(s=>{
  const btn = document.createElement("button");
  btn.className = "q-chip";
  btn.textContent = "+ "+s;
  btn.addEventListener("click",()=>{
    textarea.value = textarea.value ? textarea.value+", "+s.toLowerCase() : s.toLowerCase();
    textarea.focus();
    updateSendBtn();
  });
  qChipsEl.appendChild(btn);
});

// ── Events ────────────────────────────────────────────────────────────────────
textarea.addEventListener("input",()=>{
  textarea.style.height="auto";
  textarea.style.height=Math.min(textarea.scrollHeight,100)+"px";
  updateSendBtn();
});
textarea.addEventListener("keydown",(e)=>{
  if (e.key==="Enter"&&!e.shiftKey){e.preventDefault();processInput(textarea.value);}
});
sendBtn.addEventListener("click",()=>processInput(textarea.value));
document.getElementById("reset-btn").addEventListener("click", resetAll);

// ── Boot ──────────────────────────────────────────────────────────────────────
setTimeout(()=>appendBotMsg(buildWelcome()), 300);
</script>
</body>
</html>
