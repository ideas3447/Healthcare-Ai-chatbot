<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HealthBot — Intelligent Healthcare Assistant</title>
<style>
  /* ── Reset & Base ─────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f172a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  /* ── App shell ─────────────────────────────────────────────────────────── */
  .app {
    width: 100%;
    max-width: 780px;
    display: flex;
    flex-direction: column;
    height: 92vh;
    background: #1e293b;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,.5);
  }

  /* ── Header ────────────────────────────────────────────────────────────── */
  .header {
    background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .header-icon {
    width: 48px; height: 48px;
    background: rgba(255,255,255,.2);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }
  .header-text h1 { font-size: 1.15rem; color: #fff; font-weight: 700; }
  .header-text p  { font-size: .78rem; color: rgba(255,255,255,.8); margin-top: 2px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4ade80; margin-left: auto; flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(74,222,128,.25);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ── Alert banner ──────────────────────────────────────────────────────── */
  .alert-banner {
    display: none;
    padding: .75rem 1.5rem;
    font-size: .85rem;
    font-weight: 600;
    text-align: center;
  }
  .alert-banner.EMERGENCY { background: #dc2626; color: #fff; display: block; }
  .alert-banner.WARNING   { background: #d97706; color: #fff; display: block; }

  /* ── Symptom chips ─────────────────────────────────────────────────────── */
  .chips-bar {
    display: flex; flex-wrap: wrap; gap: .4rem;
    padding: .6rem 1.2rem;
    background: #0f172a;
    min-height: 42px;
    border-bottom: 1px solid #334155;
  }
  .chip {
    background: #1d4ed8; color: #bfdbfe;
    font-size: .72rem; padding: .2rem .6rem;
    border-radius: 20px;
  }
  .chips-label {
    font-size: .72rem; color: #64748b;
    align-self: center; margin-right: .3rem;
  }

  /* ── Messages area ─────────────────────────────────────────────────────── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: .9rem;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

  /* ── Message bubbles ───────────────────────────────────────────────────── */
  .msg { display: flex; gap: .7rem; max-width: 90%; }
  .msg.bot  { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0; margin-top: 2px;
  }
  .msg.bot  .avatar { background: linear-gradient(135deg,#0ea5e9,#6366f1); }
  .msg.user .avatar { background: #334155; }

  .bubble {
    padding: .75rem 1rem;
    border-radius: 16px;
    font-size: .88rem;
    line-height: 1.55;
    white-space: pre-wrap;
  }
  .msg.bot  .bubble {
    background: #1e3a5f;
    color: #e2e8f0;
    border-top-left-radius: 4px;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg,#0ea5e9,#6366f1);
    color: #fff;
    border-top-right-radius: 4px;
  }

  /* markdown-lite inside bubbles */
  .bubble strong { color: #7dd3fc; font-weight: 600; }
  .bubble em     { color: #94a3b8; font-style: italic; }

  /* Prediction card */
  .pred-card {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: .9rem 1rem;
    margin-top: .5rem;
    font-size: .82rem;
  }
  .pred-card .disease { font-size: 1rem; font-weight: 700; color: #38bdf8; }
  .pred-card .conf    { color: #94a3b8; font-size: .78rem; }
  .pred-card .desc    { color: #cbd5e1; margin-top: .4rem; line-height: 1.5; }
  .conf-bar {
    height: 6px; background: #1e293b; border-radius: 3px; margin-top: .5rem;
  }
  .conf-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg,#0ea5e9,#6366f1);
    transition: width .5s ease;
  }

  /* Typing indicator */
  .typing { display: flex; gap: 5px; padding: .8rem 1rem; align-items: center; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: #64748b;
    animation: bounce .9s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .30s; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

  /* ── Input bar ─────────────────────────────────────────────────────────── */
  .input-bar {
    display: flex;
    gap: .7rem;
    padding: 1rem 1.2rem;
    background: #0f172a;
    border-top: 1px solid #334155;
    align-items: flex-end;
  }
  .input-bar textarea {
    flex: 1;
    background: #1e293b;
    border: 1.5px solid #334155;
    border-radius: 14px;
    color: #e2e8f0;
    font-size: .9rem;
    padding: .7rem 1rem;
    resize: none;
    max-height: 120px;
    min-height: 46px;
    outline: none;
    transition: border-color .2s;
    font-family: inherit;
  }
  .input-bar textarea:focus { border-color: #0ea5e9; }
  .input-bar textarea::placeholder { color: #475569; }
  .send-btn {
    width: 46px; height: 46px;
    background: linear-gradient(135deg,#0ea5e9,#6366f1);
    border: none; border-radius: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity .2s, transform .1s;
  }
  .send-btn:hover { opacity: .9; }
  .send-btn:active { transform: scale(.95); }
  .send-btn svg { width: 20px; height: 20px; fill: #fff; }

  /* Reset button */
  .reset-btn {
    background: none; border: 1.5px solid #334155; border-radius: 10px;
    color: #94a3b8; font-size: .75rem; padding: .4rem .8rem;
    cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .reset-btn:hover { border-color: #ef4444; color: #ef4444; }
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">🏥</div>
    <div class="header-text">
      <h1>HealthBot AI</h1>
      <p>Intelligent Symptom Analysis & Emergency Detection</p>
    </div>
    <div class="status-dot" title="System online"></div>
  </div>

  <!-- Alert banner -->
  <div class="alert-banner" id="alertBanner"></div>

  <!-- Symptom chips -->
  <div class="chips-bar" id="chipsBar">
    <span class="chips-label">Symptoms noted:</span>
    <span id="noSyms" style="color:#475569;font-size:.75rem;align-self:center;">none yet</span>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input bar -->
  <div class="input-bar">
    <button class="reset-btn" onclick="resetChat()">🔄 Reset</button>
    <textarea id="userInput" rows="1"
      placeholder="Describe your symptoms… (e.g. I have a headache and fever)"
      onkeydown="handleKey(event)"
    ></textarea>
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
const API = "";   // same origin — Flask serves this file

// ── Markdown-lite renderer ─────────────────────────────────────────────────
function renderMd(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.*?)\*/g,     "<em>$1</em>")
    .replace(/\n/g,            "<br>");
}

// ── Add a message bubble ───────────────────────────────────────────────────
function addMsg(role, html, prediction=null, alertLevel=null) {
  const wrap = document.createElement("div");
  wrap.className = `msg ${role}`;

  const av = document.createElement("div");
  av.className = "avatar";
  av.textContent = role === "bot" ? "🤖" : "👤";

  const bub = document.createElement("div");
  bub.className = "bubble";
  bub.innerHTML = html;

  // prediction card
  if (prediction) {
    const card = document.createElement("div");
    card.className = "pred-card";
    card.innerHTML = `
      <div class="disease">${prediction.disease}</div>
      <div class="conf">Confidence: ${prediction.confidence}%</div>
      <div class="conf-bar"><div class="conf-fill" style="width:${prediction.confidence}%"></div></div>
      <div class="desc">${prediction.description}</div>
    `;
    bub.appendChild(card);
  }

  wrap.appendChild(av);
  wrap.appendChild(bub);
  document.getElementById("messages").appendChild(wrap);
  scrollBottom();
}

function showTyping() {
  const wrap = document.createElement("div");
  wrap.className = "msg bot"; wrap.id = "typing";
  wrap.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  document.getElementById("messages").appendChild(wrap);
  scrollBottom();
}
function hideTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

function scrollBottom() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}

// ── Update symptom chips ───────────────────────────────────────────────────
function updateChips(symptoms) {
  const bar = document.getElementById("chipsBar");
  const noSyms = document.getElementById("noSyms");

  // remove old chips
  bar.querySelectorAll(".chip").forEach(c => c.remove());

  if (!symptoms || symptoms.length === 0) {
    noSyms.style.display = "inline";
  } else {
    noSyms.style.display = "none";
    symptoms.forEach(s => {
      const chip = document.createElement("span");
      chip.className = "chip";
      chip.textContent = s.replace(/_/g, " ");
      bar.appendChild(chip);
    });
  }
}

// ── Update alert banner ────────────────────────────────────────────────────
function updateAlert(alert) {
  const banner = document.getElementById("alertBanner");
  if (!alert || alert.level === "NORMAL") {
    banner.className = "alert-banner";
    banner.textContent = "";
  } else if (alert.level === "EMERGENCY") {
    banner.className = "alert-banner EMERGENCY";
    banner.textContent = "🚨 EMERGENCY — Please call 112 / 911 immediately and go to the nearest hospital!";
  } else if (alert.level === "WARNING") {
    banner.className = "alert-banner WARNING";
    banner.textContent = "⚠️ WARNING — Please visit a doctor or clinic as soon as possible today.";
  }
}

// ── Send message ───────────────────────────────────────────────────────────
async function sendMessage() {
  const ta   = document.getElementById("userInput");
  const text = ta.value.trim();
  if (!text) return;

  addMsg("user", renderMd(text));
  ta.value = "";
  ta.style.height = "auto";

  showTyping();

  try {
    const res  = await fetch(`${API}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    hideTyping();

    updateChips(data.symptoms_collected || []);
    updateAlert(data.alert);

    addMsg("bot",
      renderMd(data.message),
      data.prediction || null,
      data.alert?.level || null
    );
  } catch(e) {
    hideTyping();
    addMsg("bot", "⚠️ Could not reach the server. Make sure the Flask API is running.");
  }
}

async function resetChat() {
  await fetch(`${API}/reset`, { method: "POST" });
  document.getElementById("messages").innerHTML = "";
  updateChips([]);
  updateAlert(null);
  sendWelcome();
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  // auto-resize textarea
  const ta = e.target;
  ta.style.height = "auto";
  ta.style.height = Math.min(ta.scrollHeight, 120) + "px";
}

// ── Boot ───────────────────────────────────────────────────────────────────
function sendWelcome() {
  addMsg("bot", renderMd(
    "👋 Hello! I am your **Healthcare Assistant**.\n\n" +
    "I can help you analyze your symptoms and detect potential health conditions.\n\n" +
    "Please describe how you are feeling — for example:\n" +
    "*\"I have a headache, high fever and I feel very tired.\"*\n\n" +
    "⚠️ *Disclaimer: This chatbot is not a substitute for professional medical advice.*"
  ));
}

document.addEventListener("DOMContentLoaded", sendWelcome);
</script>
</body>
</html>
